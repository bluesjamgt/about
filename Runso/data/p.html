<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>runso/ Editor | The Ultimate WYSIWYG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #0070f3;
            --bg: #ffffff;
            --text: #37352f;
            --muted: #787774;
            --border: #ededed;
            --hover: #f7f7f5;

            /* 動態版面變數 */
            --dyn-chord-size: 1rem;
            --dyn-lyric-size: 1.15rem;
            --dyn-line-height: 2.8;
            /* 控制歌詞間的垂直距離 */
            --dyn-columns: 1;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 1. 頂部 --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: #fafafa;
        }

        .brand {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .meta-inputs {
            display: flex;
            gap: 8px;
        }

        .meta-inputs input {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
            width: 120px;
        }

        #meta-title {
            width: 200px;
            font-weight: 600;
        }

        .actions button {
            padding: 6px 14px;
            margin-left: 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            background: white;
            font-weight: 500;
        }

        .actions button:hover {
            background: var(--hover);
        }

        .save-btn {
            background-color: #2ea44f !important;
            color: white !important;
            border: none !important;
        }

        .print-btn {
            background-color: var(--primary) !important;
            color: white !important;
            border: none !important;
        }

        /* --- 2. 佈局 --- */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .main-canvas {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: #fbfbfa;
            padding: 0 10%;
            align-items: center;
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            color: var(--muted);
            font-weight: 500;
            border-bottom: 2px solid transparent;
            font-size: 0.9rem;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .view-panel {
            display: none;
            padding: 32px 10%;
            flex: 1;
            overflow-y: auto;
        }

        .view-panel.active {
            display: block;
        }

        /* --- View 1: Raw --- */
        #raw-lyrics-textarea {
            width: 100%;
            height: 70vh;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-size: 1.1rem;
            font-family: monospace;
            resize: none;
            line-height: 1.6;
            outline: none;
        }

        #raw-lyrics-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px #d6e8ff;
        }

        /* --- View 2: WYSIWYG Editor (THE MAGIC) --- */
        .editor-toolbar {
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 1px dashed var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
            position: sticky;
            top: -32px;
            background: white;
            z-index: 10;
        }

        .btn-insert {
            background: #e5f1ff;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-insert:hover {
            background: var(--primary);
            color: white;
        }

        .shortcut-hint {
            font-size: 0.8rem;
            color: var(--muted);
        }

        #editor-canvas {
            white-space: pre-wrap;
            /* 允許原生換行與連續空白 */
            outline: none;
            font-size: var(--dyn-lyric-size);
            line-height: var(--dyn-line-height);
            /* 神奇的間距控制 */
            column-count: var(--dyn-columns);
            column-gap: 60px;
            min-height: 50vh;
            padding-bottom: 40px;
            letter-spacing: 0.5px;
        }

        /* 內嵌和弦魔法 */
        .chord-anchor {
            display: inline-block;
            width: 0;
            height: 0;
            position: relative;
            overflow: visible;
            vertical-align: baseline;
            user-select: none;
        }

        .chord-input {
            position: absolute;
            bottom: 0.8em;
            left: 0;
            transform: translateX(-50%);
            min-width: 1ch;
            display: inline-block;
            font-size: var(--dyn-chord-size);
            font-weight: 700;
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            text-align: center;
            white-space: nowrap;
            cursor: text;
            padding: 0 4px;
            border: 1px solid transparent;
            border-radius: 4px;
        }

        .chord-input:empty::before {
            content: "空";
            color: #ccc;
            font-weight: 400;
        }

        .chord-input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 2px #d6e8ff;
            z-index: 10;
        }

        /* --- View 3: Lead Sheet --- */
        #leadsheet-canvas {
            column-count: var(--dyn-columns);
            column-gap: 60px;
        }

        .section-block {
            margin-bottom: 32px;
            break-inside: avoid;
        }

        .section-title {
            font-weight: 700;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            margin-bottom: 16px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .chord-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 24px;
            font-size: calc(var(--dyn-chord-size) * 1.3);
            font-weight: 600;
            font-family: monospace;
            color: var(--text);
        }

        .chord-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            min-width: 50px;
        }

        .beat-badge {
            font-size: 0.75rem;
            color: white;
            background: #a1a19f;
            padding: 2px 7px;
            border-radius: 12px;
            font-weight: 400;
            font-family: 'Inter', sans-serif;
        }

        /* --- 3. 右側面板 --- */
        .sidebar {
            flex: 0 0 300px;
            border-left: 1px solid var(--border);
            background: #fafafa;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section h3 {
            margin-top: 0;
            font-size: 0.95rem;
            color: #333;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .empty-state {
            color: var(--muted);
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.6;
        }

        /* 版面調整 */
        .range-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .range-group label {
            width: 80px;
            font-size: 0.8rem;
            color: var(--muted);
            margin: 0;
        }

        .range-group input[type=range] {
            flex: 1;
        }

        .range-val {
            font-size: 0.75rem;
            color: var(--primary);
            width: 30px;
            text-align: right;
            font-weight: 600;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- 列印 100% 完美對齊魔法 --- */
        @media print {

            header,
            .tabs,
            .sidebar,
            .editor-toolbar {
                display: none !important;
            }

            .workspace,
            .main-canvas {
                overflow: visible !important;
                display: block !important;
            }

            .view-panel {
                padding: 0 !important;
                margin-bottom: 40px;
                display: block !important;
            }

            body {
                height: auto !important;
            }

            #song-meta-print {
                display: block !important;
                font-size: 1rem;
                color: #666;
                margin-bottom: 32px;
                border-bottom: 2px solid #000;
                padding-bottom: 8px;
            }

            #song-title-print {
                display: block !important;
                font-size: 1.8rem;
                font-weight: 700;
                margin-bottom: 8px;
            }

            .view-panel:not(.active) {
                display: none !important;
            }

            /* 列印時移除和弦框線，確保背景渲染 */
            .chord-input {
                border: none !important;
                background: transparent !important;
                box-shadow: none !important;
            }

            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">runso/ <span>Editor</span></div>
        <div class="meta-inputs">
            <input type="text" id="meta-title" placeholder="歌曲名稱" value="告訴我也好 (Tell me)">
            <input type="text" id="meta-artist" placeholder="藝人" value="Runner's Blue">
            <input type="text" id="meta-bpm" placeholder="BPM" value="120">
        </div>
        <div class="actions">
            <button onclick="newProject()">📝 開新</button>
            <button class="save-btn" onclick="saveProject()">💾 儲存</button>
            <button class="print-btn" onclick="window.print()">🖨️ 匯出 PDF</button>
        </div>
    </header>

    <div class="workspace">
        <div class="main-canvas">
            <nav class="tabs">
                <div class="tab active" onclick="switchView(1)">1. 貼上歌詞 (Raw)</div>
                <div class="tab" onclick="switchView(2)">2. 畫布編輯 (Arrange)</div>
                <div class="tab" onclick="switchView(3)">3. 純和弦 (Lead Sheet)</div>
            </nav>

            <div id="print-header" style="display:none; padding: 0 10% 0 10%;">
                <div id="song-title-print"></div>
                <div id="song-meta-print"></div>
            </div>

            <div id="view-raw" class="view-panel active">
                <div style="margin-bottom: 12px; color: var(--muted); font-size: 0.9rem;">
                    💡 提示：這裡顯示的是底層資料。和弦會以 `[和弦|拍子|段落]` 的格式儲存。您可以直接切換到「畫布編輯」自由打字。
                </div>
                <textarea id="raw-lyrics-textarea" placeholder="在這裡貼上純文字..."></textarea>
            </div>

            <div id="view-arrange" class="view-panel">
                <div class="editor-toolbar">
                    <button class="btn-insert" onclick="insertChordAtCursor()">➕ 在游標處插入和弦</button>
                    <span class="shortcut-hint">(快捷鍵：Ctrl + K)</span>
                </div>
                <div id="editor-canvas" contenteditable="true" spellcheck="false"></div>
            </div>

            <div id="view-leadsheet" class="view-panel">
                <div id="leadsheet-canvas"></div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-section" style="flex: 1;">
                <h3>🎯 和弦屬性</h3>
                <div id="inspector-empty" class="empty-state">
                    請在畫布上點選任何藍色的「和弦字體」<br>來設定它的拍數與段落。
                </div>

                <div id="inspector-form" style="display: none;">
                    <div class="form-group">
                        <label>和弦 (Chord)</label>
                        <input type="text" id="prop-chord" placeholder="例: C#m7">
                    </div>
                    <div class="form-group">
                        <label>拍子長度 (Beats)</label>
                        <select id="prop-beats">
                            <option value="">無</option>
                            <option value="4">4 拍 (1小節)</option>
                            <option value="2">2 拍 (半小節)</option>
                            <option value="1">1 拍</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>標記為新段落 (Section)</label>
                        <input type="text" id="prop-section" placeholder="例: Intro, Verse 1">
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>🎛️ 版面與列印設定</h3>
                <div class="range-group">
                    <label>和弦字體</label>
                    <input type="range" id="ui-chord-size" min="0.6" max="1.5" step="0.05" value="1">
                    <span class="range-val" id="val-chord-size">1</span>
                </div>
                <div class="range-group">
                    <label>歌詞字體</label>
                    <input type="range" id="ui-lyric-size" min="0.8" max="2" step="0.05" value="1.15">
                    <span class="range-val" id="val-lyric-size">1.15</span>
                </div>
                <div class="range-group">
                    <label>行距 (消滅空白)</label>
                    <input type="range" id="ui-line-height" min="1.5" max="4" step="0.1" value="2.8">
                    <span class="range-val" id="val-line-height">2.8</span>
                </div>
                <label class="toggle-group">
                    <input type="checkbox" id="ui-columns"> 開啟雙排格式 (A4列印)
                </label>
            </div>
        </aside>
    </div>

    <script>
        // 預設資料 (ChordPro 語法)
        let rawData = "[Am|4|Verse 1]華やいだ風に さらされても\n[F#m]溶けてゆけない [E]自分を見つめている\n\n[C5|4|Solo][D5|4|]\n";
        let activeChordInput = null; // 當前聚焦的和弦節點

        // --- 初始化 ---
        window.onload = () => {
            initLayoutControls();
            const saved = localStorage.getItem('runsoV2');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('meta-title').value = data.title;
                document.getElementById('meta-artist').value = data.artist;
                document.getElementById('meta-bpm').value = data.bpm;
                rawData = data.rawText;
            }
            document.getElementById('raw-lyrics-textarea').value = rawData;
            rawToEditor(); // 初始化渲染畫布
            switchView(2); // 直接進入好用的 Arrange 視圖
        }

        // --- 視圖同步與切換 ---
        function switchView(tabIndex) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === tabIndex - 1));
            document.getElementById('view-raw').style.display = (tabIndex === 1) ? 'block' : 'none';
            document.getElementById('view-arrange').style.display = (tabIndex === 2) ? 'block' : 'none';
            document.getElementById('view-leadsheet').style.display = (tabIndex === 3) ? 'block' : 'none';

            // 切換前的資料同步
            if (tabIndex === 1) { editorToRaw(); } // Arrange -> Raw
            if (tabIndex === 2) { rawToEditor(); } // Raw -> Arrange
            if (tabIndex === 3) { editorToRaw(); renderLeadSheet(); } // Arrange -> Raw -> LeadSheet

            // 列印資訊
            document.getElementById('song-title-print').innerText = document.getElementById('meta-title').value || "Untitled";
            document.getElementById('song-meta-print').innerText = `${document.getElementById('meta-artist').value} | BPM: ${document.getElementById('meta-bpm').value}`;
        }

        // --- 核心魔法 1：資料解析 (Raw <-> Editor) ---
        function editorToRaw() {
            const canvas = document.getElementById('editor-canvas');
            const clone = canvas.cloneNode(true);

            // 將所有 HTML 錨點轉換回 [Chord|Beats|Section] 文字
            const anchors = clone.querySelectorAll('.chord-anchor');
            anchors.forEach(a => {
                const input = a.querySelector('.chord-input');
                const val = input.innerText.trim();
                const beats = input.dataset.beats || "";
                const sec = input.dataset.section || "";

                let marker = `[${val}`;
                if (beats || sec) marker += `|${beats}|${sec}`;
                marker += `]`;

                a.replaceWith(document.createTextNode(marker));
            });

            // 處理 div 換行
            let text = clone.innerText;
            document.getElementById('raw-lyrics-textarea').value = text;
            rawData = text;
        }

        function rawToEditor() {
            let text = document.getElementById('raw-lyrics-textarea').value;
            // 轉換特殊字元，保留換行
            let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            // 將 [C#m|4|Intro] 轉換為畫布 HTML 節點
            const regex = /\[([^\]]*)\]/g;
            html = html.replace(regex, (match, content) => {
                const parts = content.split('|');
                const val = parts[0] || "";
                const beats = parts[1] || "";
                const sec = parts[2] || "";

                return `<span class="chord-anchor" contenteditable="false"><span class="chord-input" contenteditable="true" data-beats="${beats}" data-section="${sec}" onfocus="setActiveChord(this)" oninput="syncChordValue(this)">${val}</span></span>`;
            });

            document.getElementById('editor-canvas').innerHTML = html;
        }

        // --- 核心魔法 2：插入和弦與游標操作 ---
        function insertChordAtCursor() {
            document.getElementById('editor-canvas').focus(); // 確保畫布有焦點
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);

            // 確保只在畫布內插入
            if (!document.getElementById('editor-canvas').contains(range.commonAncestorContainer)) return;

            // 建立節點
            const anchor = document.createElement('span');
            anchor.className = 'chord-anchor';
            anchor.contentEditable = "false";

            const input = document.createElement('span');
            input.className = 'chord-input';
            input.contentEditable = "true";
            input.dataset.beats = "";
            input.dataset.section = "";
            input.onfocus = function () { setActiveChord(this); };
            input.oninput = function () { syncChordValue(this); };

            anchor.appendChild(input);
            range.insertNode(anchor);

            // 聚焦到新和弦，準備打字
            input.focus();
        }

        // 快捷鍵攔截
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
                e.preventDefault();
                insertChordAtCursor();
            }
        });

        // 畫布本身禁止在裡面亂塞 div，確保換行是乾淨的
        document.getElementById('editor-canvas').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.execCommand('insertLineBreak');
                e.preventDefault();
            }
        });

        // --- 右側屬性面板連動 ---
        const props = {
            val: document.getElementById('prop-chord'),
            beats: document.getElementById('prop-beats'),
            sec: document.getElementById('prop-section')
        };

        function setActiveChord(element) {
            activeChordInput = element;
            document.getElementById('inspector-empty').style.display = 'none';
            document.getElementById('inspector-form').style.display = 'block';

            props.val.value = element.innerText;
            props.beats.value = element.dataset.beats || "";
            props.sec.value = element.dataset.section || "";
        }

        function syncChordValue(element) {
            if (activeChordInput === element) props.val.value = element.innerText;
        }

        // 監聽面板輸入，寫回畫布
        props.val.addEventListener('input', (e) => { if (activeChordInput) activeChordInput.innerText = e.target.value; });
        props.beats.addEventListener('change', (e) => { if (activeChordInput) activeChordInput.dataset.beats = e.target.value; });
        props.sec.addEventListener('input', (e) => { if (activeChordInput) activeChordInput.dataset.section = e.target.value; });

        // --- Lead Sheet 渲染 ---
        function renderLeadSheet() {
            const surface = document.getElementById('leadsheet-canvas');
            surface.innerHTML = "";

            // 由於剛剛已經跑過 editorToRaw，我們可以直接從畫布擷取排序好的節點
            const inputs = document.getElementById('editor-canvas').querySelectorAll('.chord-input');
            if (inputs.length === 0) return surface.innerHTML = '<div class="empty-state">畫布上沒有任何和弦。</div>';

            let currentSection = "";
            let gridEl = null;

            inputs.forEach(input => {
                const val = input.innerText.trim();
                if (!val) return; // 略過空白和弦

                const sec = input.dataset.section;
                const beats = input.dataset.beats;

                if (sec && sec !== currentSection) {
                    currentSection = sec;
                    const block = document.createElement('div');
                    block.className = 'section-block';
                    block.innerHTML = `<div class="section-title">${sec}</div>`;
                    gridEl = document.createElement('div');
                    gridEl.className = 'chord-grid';
                    block.appendChild(gridEl);
                    surface.appendChild(block);
                } else if (!currentSection && !gridEl) {
                    gridEl = document.createElement('div');
                    gridEl.className = 'chord-grid';
                    surface.appendChild(gridEl);
                }

                gridEl.innerHTML += `<div class="chord-item"><span>${val}</span>${beats ? `<span class="beat-badge">${beats}</span>` : ''}</div>`;
            });
        }

        // --- 存檔與版面 ---
        function saveProject() {
            editorToRaw();
            const data = {
                title: document.getElementById('meta-title').value,
                artist: document.getElementById('meta-artist').value,
                bpm: document.getElementById('meta-bpm').value,
                rawText: rawData
            };
            localStorage.setItem('runsoV2', JSON.stringify(data));
            alert("已成功儲存。");
        }

        function newProject() {
            if (confirm("確定開新？")) {
                localStorage.removeItem('runsoV2');
                location.reload();
            }
        }

        function initLayoutControls() {
            const controls = [
                { id: 'ui-chord-size', var: '--dyn-chord-size', unit: 'rem', valId: 'val-chord-size' },
                { id: 'ui-lyric-size', var: '--dyn-lyric-size', unit: 'rem', valId: 'val-lyric-size' },
                { id: 'ui-line-height', var: '--dyn-line-height', unit: '', valId: 'val-line-height' }
            ];
            controls.forEach(c => {
                const input = document.getElementById(c.id);
                const valDisp = document.getElementById(c.valId);
                input.addEventListener('input', (e) => {
                    valDisp.innerText = e.target.value;
                    document.documentElement.style.setProperty(c.var, e.target.value + c.unit);
                });
            });
            document.getElementById('ui-columns').addEventListener('change', (e) => {
                document.documentElement.style.setProperty('--dyn-columns', e.target.checked ? '2' : '1');
            });
        }
    </script>
</body>

</html>
